<script type="module">
// ================================================================
//  Soil Lab – MLS-MPM with Drucker-Prager Elastoplasticity (WebGPU)
// ================================================================

// ─── Mat4 helpers ────────────────────────────────────────────────
const F32 = Float32Array;
function m4(){ return new F32(16) }
function m4id(o){ o.fill(0); o[0]=o[5]=o[10]=o[15]=1; return o }
function m4persp(o,fov,asp,n,f){
  const t=1/Math.tan(fov/2), nf=1/(n-f);
  o.fill(0); o[0]=t/asp; o[5]=t; o[10]=(f+n)*nf; o[11]=-1; o[14]=2*f*n*nf; return o;
}
function m4look(o,e,c,u){
  let zx=e[0]-c[0],zy=e[1]-c[1],zz=e[2]-c[2],l=1/Math.hypot(zx,zy,zz);
  zx*=l;zy*=l;zz*=l;
  let xx=u[1]*zz-u[2]*zy,xy=u[2]*zx-u[0]*zz,xz=u[0]*zy-u[1]*zx;
  l=1/Math.hypot(xx,xy,xz); xx*=l;xy*=l;xz*=l;
  let yx=zy*xz-zz*xy,yy=zz*xx-zx*xz,yz=zx*xy-zy*xx;
  o[0]=xx;o[1]=yx;o[2]=zx;o[3]=0; o[4]=xy;o[5]=yy;o[6]=zy;o[7]=0;
  o[8]=xz;o[9]=yz;o[10]=zz;o[11]=0;
  o[12]=-(xx*e[0]+xy*e[1]+xz*e[2]); o[13]=-(yx*e[0]+yy*e[1]+yz*e[2]);
  o[14]=-(zx*e[0]+zy*e[1]+zz*e[2]); o[15]=1; return o;
}
function m4mul(o,a,b){
  for(let i=0;i<4;i++)for(let j=0;j<4;j++){
    let s=0;for(let k=0;k<4;k++)s+=a[k*4+i]*b[j*4+k];o[j*4+i]=s;}return o;
}
function m4inv(o,m){
  const a=m[0],b=m[1],c=m[2],d=m[3],e=m[4],f=m[5],g=m[6],h=m[7],
    i=m[8],j=m[9],k=m[10],l=m[11],M=m[12],n=m[13],p=m[14],q=m[15];
  const A=a*f-b*e,B=a*g-c*e,C=a*h-d*e,D=b*g-c*f,E=b*h-d*f,F=c*h-d*g,
    G=i*n-j*M,H=i*p-k*M,I=i*q-l*M,J=j*p-k*n,K=j*q-l*n,L=k*q-l*p;
  let det=A*L-B*K+C*J+D*I-E*H+F*G; if(!det)return null; det=1/det;
  o[0]=(f*L-g*K+h*J)*det;o[1]=(c*K-b*L-d*J)*det;o[2]=(n*F-p*E+q*D)*det;o[3]=(k*E-j*F-l*D)*det;
  o[4]=(g*I-e*L-h*H)*det;o[5]=(a*L-c*I+d*H)*det;o[6]=(p*C-M*F-q*B)*det;o[7]=(i*F-k*C+l*B)*det;
  o[8]=(e*K-f*I+h*G)*det;o[9]=(b*I-a*K-d*G)*det;o[10]=(M*E-n*C+q*A)*det;o[11]=(j*C-i*E-l*A)*det;
  o[12]=(f*H-e*J-g*G)*det;o[13]=(a*J-b*H+c*G)*det;o[14]=(n*B-M*D-p*A)*det;o[15]=(i*D-j*B+k*A)*det;
  return o;
}

// ─── Constants ───────────────────────────────────────────────────
const GX=70, GY=50, GZ=70, TOTAL_CELLS=GX*GY*GZ;
const MAX_P=150000, P_STRIDE=144, PV_STRIDE=32, FP_MULT=1e4, FP_INV=1/FP_MULT;

// ─── Material presets ────────────────────────────────────────────
const MATS = {
  sand:   { E:1.4e4, nu:0.2, phi:35*Math.PI/180, coh:0.5 },
  clay:   { E:8e3,   nu:0.35, phi:20*Math.PI/180, coh:30 },
  gravel: { E:2e4,   nu:0.15, phi:42*Math.PI/180, coh:0.1 },
  mud:    { E:4e3,   nu:0.4,  phi:12*Math.PI/180, coh:8 },
};

// ─── WGSL Shared Definitions ────────────────────────────────────
const PARTICLE_DEF = `struct Particle { position:vec3f, v:vec3f, C:mat3x3f, F:mat3x3f, logJp:f32, }`;
const CELL_DEF_A   = `struct Cell { vx:atomic<i32>, vy:atomic<i32>, vz:atomic<i32>, mass:atomic<i32>, }`;
const CELL_DEF     = `struct Cell { vx:i32, vy:i32, vz:i32, mass:i32, }`;
const SIM_PARAMS   = `struct SimParams { dt:f32, gravity:f32, mu0:f32, lambda0:f32, frictionAngle:f32, cohesion:f32, mouseRadius:f32, mouseActive:f32, mousePos:vec4f, mouseVel:vec4f, }`;
const FP_ENCODE    = `override FP_MULT:f32; fn encode(v:f32)->i32{return i32(v*FP_MULT);}`;
const FP_DECODE    = `override FP_INV:f32; fn decode(v:i32)->f32{return f32(v)*FP_INV;}`;
const FP_BOTH      = `override FP_MULT:f32; override FP_INV:f32; fn encode(v:f32)->i32{return i32(v*FP_MULT);} fn decode(v:i32)->f32{return f32(v)*FP_INV;}`;

// ─── SVD via Jacobi rotations (3×3) ─────────────────────────────
const SVD_FUNC = `
struct SVDResult { U:mat3x3f, sigma:vec3f, V:mat3x3f, }
fn svd3x3(inF:mat3x3f)->SVDResult {
  var S = transpose(inF)*inF;
  var V = mat3x3f(vec3f(1,0,0),vec3f(0,1,0),vec3f(0,0,1));
  for(var iter=0u; iter<10u; iter++){
    // zero (0,1)
    { let b=S[1][0];
      if(abs(b)>1e-6){
        let a_=S[0][0]; let d=S[1][1]; let tau=(d-a_)/(2.0*b);
        var t:f32; if(abs(tau)<1e-6){t=1.0;}else{t=sign(tau)/(abs(tau)+sqrt(1.0+tau*tau));}
        let c=1.0/sqrt(1.0+t*t); let s=t*c;
        let c0=S[0]; let c1=S[1]; S[0]=c*c0-s*c1; S[1]=s*c0+c*c1;
        for(var k=0u;k<3u;k++){let col=S[k]; S[k]=vec3f(c*col.x+s*col.y,-s*col.x+c*col.y,col.z);}
        let v0=V[0]; let v1=V[1]; V[0]=c*v0-s*v1; V[1]=s*v0+c*v1;
    }}
    // zero (0,2)
    { let b=S[2][0];
      if(abs(b)>1e-6){
        let a_=S[0][0]; let d=S[2][2]; let tau=(d-a_)/(2.0*b);
        var t:f32; if(abs(tau)<1e-6){t=1.0;}else{t=sign(tau)/(abs(tau)+sqrt(1.0+tau*tau));}
        let c=1.0/sqrt(1.0+t*t); let s=t*c;
        let c0=S[0]; let c2=S[2]; S[0]=c*c0-s*c2; S[2]=s*c0+c*c2;
        for(var k=0u;k<3u;k++){let col=S[k]; S[k]=vec3f(c*col.x+s*col.z,col.y,-s*col.x+c*col.z);}
        let v0=V[0]; let v2=V[2]; V[0]=c*v0-s*v2; V[2]=s*v0+c*v2;
    }}
    // zero (1,2)
    { let b=S[2][1];
      if(abs(b)>1e-6){
        let a_=S[1][1]; let d=S[2][2]; let tau=(d-a_)/(2.0*b);
        var t:f32; if(abs(tau)<1e-6){t=1.0;}else{t=sign(tau)/(abs(tau)+sqrt(1.0+tau*tau));}
        let c=1.0/sqrt(1.0+t*t); let s=t*c;
        let c1=S[1]; let c2=S[2]; S[1]=c*c1-s*c2; S[2]=s*c1+c*c2;
        for(var k=0u;k<3u;k++){let col=S[k]; S[k]=vec3f(col.x,c*col.y+s*col.z,-s*col.y+c*col.z);}
        let v1=V[1]; let v2=V[2]; V[1]=c*v1-s*v2; V[2]=s*v1+c*v2;
    }}
  }
  let sigma=vec3f(sqrt(max(0.0,S[0][0])),sqrt(max(0.0,S[1][1])),sqrt(max(0.0,S[2][2])));
  let FV=inF*V;
  var U=mat3x3f(vec3f(1,0,0),vec3f(0,1,0),vec3f(0,0,1));
  if(sigma.x>1e-6){U[0]=FV[0]/sigma.x;}
  if(sigma.y>1e-6){U[1]=FV[1]/sigma.y;}
  if(sigma.z>1e-6){U[2]=FV[2]/sigma.z;}
  return SVDResult(U,sigma,V);
}`;

// ─── Compute: clearGrid ─────────────────────────────────────────
const CLEAR_GRID = CELL_DEF + `
@group(0) @binding(0) var<storage, read_write> cells:array<Cell>;
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) id:vec3u){
  if(id.x < arrayLength(&cells)){ cells[id.x].mass=0; cells[id.x].vx=0; cells[id.x].vy=0; cells[id.x].vz=0; }
}`;

// ─── Compute: P2G (SVD + Drucker-Prager + Neo-Hookean stress) ──
const P2G_CODE = PARTICLE_DEF + CELL_DEF_A + SIM_PARAMS + FP_ENCODE + SVD_FUNC + `
@group(0) @binding(0) var<storage, read_write> particles:array<Particle>;
@group(0) @binding(1) var<storage, read_write> cells:array<Cell>;
@group(0) @binding(2) var<uniform> gridSize:vec3f;
@group(0) @binding(3) var<uniform> numParticles:u32;
@group(0) @binding(4) var<uniform> params:SimParams;

@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) id:vec3u){
  if(id.x >= numParticles){return;}
  let p = particles[id.x];
  var F = p.F;
  let svd = svd3x3(F);

  // Drucker-Prager return mapping on singular values
  let eps = vec3f(log(max(1e-8,svd.sigma.x)), log(max(1e-8,svd.sigma.y)), log(max(1e-8,svd.sigma.z)));
  let epsTrace = eps.x+eps.y+eps.z;
  let epsDev = eps - vec3f(epsTrace/3.0);
  let epsDevNorm = length(epsDev);
  let sinPhi = sin(params.frictionAngle);
  let cosPhi = cos(params.frictionAngle);
  let alpha = sqrt(2.0/3.0)*2.0*sinPhi/(3.0-sinPhi);
  let kc    = sqrt(2.0/3.0)*2.0*params.cohesion*cosPhi/(3.0-sinPhi);
  let yf = epsDevNorm + alpha*epsTrace - kc;

  var projSigma = svd.sigma;
  if(epsTrace > 0.0){
    projSigma = vec3f(1.0); // tension: clamp to identity
  } else if(yf > 0.0){
    let dg = yf/(1.0+alpha*alpha);
    let pe = eps - dg*epsDev/max(epsDevNorm,1e-8);
    projSigma = vec3f(exp(pe.x),exp(pe.y),exp(pe.z));
  }
  let sigMat = mat3x3f(vec3f(projSigma.x,0,0),vec3f(0,projSigma.y,0),vec3f(0,0,projSigma.z));
  F = svd.U * sigMat * transpose(svd.V);
  particles[id.x].F = F;

  // Neo-Hookean Kirchhoff stress: τ = μ(FFᵀ-I) + λ ln(J) I
  let J = projSigma.x*projSigma.y*projSigma.z;
  let logJ = log(max(1e-10, J));
  let mu = params.mu0; let lam = params.lambda0;
  let FFt = F * transpose(F);
  let I3 = mat3x3f(vec3f(1,0,0),vec3f(0,1,0),vec3f(0,0,1));
  let tau = mu*(FFt - I3) + lam*logJ*I3;

  let dt = params.dt;
  let p_vol = 1.0; // particle volume ≈ dx^3 = 1
  let stressScale = -p_vol*4.0*dt; // -vol * 4 * invDx² * dt, invDx=1

  // B-spline weights (cell-centered)
  let ci = floor(p.position);
  let cd = p.position - (ci+0.5);
  var w:array<vec3f,3>;
  w[0]=0.5*(0.5-cd)*(0.5-cd); w[1]=0.75-cd*cd; w[2]=0.5*(0.5+cd)*(0.5+cd);
  let Cm = p.C;

  let GX = i32(gridSize.x); let GY = i32(gridSize.y); let GZ = i32(gridSize.z);

  for(var gx=0;gx<3;gx++){for(var gy=0;gy<3;gy++){for(var gz=0;gz<3;gz++){
    let wt = w[gx].x*w[gy].y*w[gz].z;
    if(wt<1e-12){continue;}
    let cxi = i32(ci.x)+gx-1; let cyi = i32(ci.y)+gy-1; let czi = i32(ci.z)+gz-1;
    if(cxi<0 || cxi>=GX || cyi<0 || cyi>=GY || czi<0 || czi>=GZ){continue;}
    let cx = vec3f(f32(cxi), f32(cyi), f32(czi));
    let cdist = (cx+0.5)-p.position;
    let Q = Cm*cdist;
    let mc = wt*1.0; // particle mass = 1
    let vc = mc*(p.v+Q);
    let sf = stressScale*wt*(tau*cdist);
    let idx = cxi*GY*GZ+cyi*GZ+czi;
    atomicAdd(&cells[idx].mass, encode(mc));
    atomicAdd(&cells[idx].vx, encode(vc.x+sf.x));
    atomicAdd(&cells[idx].vy, encode(vc.y+sf.y));
    atomicAdd(&cells[idx].vz, encode(vc.z+sf.z));
  }}}
}`;

// ─── Compute: updateGrid ────────────────────────────────────────
const UPDATE_GRID = CELL_DEF + SIM_PARAMS + FP_BOTH + `
@group(0) @binding(0) var<storage, read_write> cells:array<Cell>;
@group(0) @binding(1) var<uniform> gridSize:vec3f;
@group(0) @binding(2) var<uniform> params:SimParams;

@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) id:vec3u){
  if(id.x >= arrayLength(&cells)){return;}
  let m = decode(cells[id.x].mass);
  if(m < 1e-10){return;}
  var vx = decode(cells[id.x].vx)/m;
  var vy = decode(cells[id.x].vy)/m;
  var vz = decode(cells[id.x].vz)/m;

  vy -= params.gravity*params.dt;
  let damp = 0.985; vx*=damp; vy*=damp; vz*=damp;

  // Mouse interaction
  if(params.mouseActive > 0.5){
    let gsy = i32(gridSize.y); let gsz = i32(gridSize.z);
    let ix = f32(i32(id.x)/gsz/gsy);
    let iy = f32((i32(id.x)/gsz)%gsy);
    let iz = f32(i32(id.x)%gsz);
    let diff = params.mousePos.xyz - vec3f(ix,iy,iz);
    let d2 = dot(diff,diff); let r=params.mouseRadius;
    let s = smoothstep(r*r, 0.0, d2)*0.2;
    vx+=s*params.mouseVel.x; vy+=s*params.mouseVel.y; vz+=s*params.mouseVel.z;
  }

  let bd=2; let gsy=i32(gridSize.y); let gsz=i32(gridSize.z);
  let xi=i32(id.x)/gsz/gsy; let yi=(i32(id.x)/gsz)%gsy; let zi=i32(id.x)%gsz;
  if(xi<bd || xi>=i32(gridSize.x)-bd){vx=0.0;}
  if(zi<bd || zi>=i32(gridSize.z)-bd){vz=0.0;}
  if(yi<bd){vy=max(0.0,vy);}
  if(yi>=i32(gridSize.y)-bd){vy=min(0.0,vy);}

  cells[id.x].vx=encode(vx); cells[id.x].vy=encode(vy); cells[id.x].vz=encode(vz);
}`;

// ─── Compute: G2P (velocity gather + F update) ──────────────────
const G2P_CODE = PARTICLE_DEF + CELL_DEF + SIM_PARAMS + FP_DECODE + `
@group(0) @binding(0) var<storage, read_write> particles:array<Particle>;
@group(0) @binding(1) var<storage, read> cells:array<Cell>;
@group(0) @binding(2) var<uniform> gridSize:vec3f;
@group(0) @binding(3) var<uniform> numParticles:u32;
@group(0) @binding(4) var<uniform> params:SimParams;

@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) id:vec3u){
  if(id.x >= numParticles){return;}
  let p = particles[id.x];
  let dt = params.dt;
  let ci = floor(p.position);
  let cd = p.position-(ci+0.5);
  var w:array<vec3f,3>;
  w[0]=0.5*(0.5-cd)*(0.5-cd); w[1]=0.75-cd*cd; w[2]=0.5*(0.5+cd)*(0.5+cd);

  let GX = i32(gridSize.x); let GY = i32(gridSize.y); let GZ = i32(gridSize.z);

  var nv = vec3f(0.0);
  var B = mat3x3f(vec3f(0),vec3f(0),vec3f(0));
  for(var gx=0;gx<3;gx++){for(var gy=0;gy<3;gy++){for(var gz=0;gz<3;gz++){
    let wt = w[gx].x*w[gy].y*w[gz].z;
    if(wt<1e-12){continue;}
    let cxi = i32(ci.x)+gx-1; let cyi = i32(ci.y)+gy-1; let czi = i32(ci.z)+gz-1;
    if(cxi<0 || cxi>=GX || cyi<0 || cyi>=GY || czi<0 || czi>=GZ){continue;}
    let cx = vec3f(f32(cxi), f32(cyi), f32(czi));
    let cdist = (cx+0.5)-p.position;
    let idx = cxi*GY*GZ+cyi*GZ+czi;
    let gv = vec3f(decode(cells[idx].vx), decode(cells[idx].vy), decode(cells[idx].vz));
    let wv = gv*wt;
    nv += wv;
    B += mat3x3f(wv*cdist.x, wv*cdist.y, wv*cdist.z);
  }}}

  particles[id.x].v = nv;
  let newC = B*4.0;
  particles[id.x].C = newC;
  particles[id.x].position = clamp(p.position+dt*nv, vec3f(2.0), gridSize-3.0);

  // Update deformation gradient: F_new = (I + dt*C) * F_old
  let I3 = mat3x3f(vec3f(1,0,0),vec3f(0,1,0),vec3f(0,0,1));
  let A = I3 + dt*newC;
  particles[id.x].F = A * p.F;
}`;

// ─── Compute: copyPosVel ─────────────────────────────────────────
const COPY_PV = PARTICLE_DEF + `
struct PosVel { position:vec3f, v:vec3f, }
@group(0) @binding(0) var<storage, read> particles:array<Particle>;
@group(0) @binding(1) var<storage, read_write> posvel:array<PosVel>;
@group(0) @binding(2) var<uniform> numParticles:u32;
@compute @workgroup_size(64) fn main(@builtin(global_invocation_id) id:vec3u){
  if(id.x<numParticles){ posvel[id.x].position=particles[id.x].position; posvel[id.x].v=particles[id.x].v; }
}`;

// ─── Render uniforms struct ──────────────────────────────────────
const RENDER_UNI = `struct RU { projMat:mat4x4f, invProjMat:mat4x4f, viewMat:mat4x4f, invViewMat:mat4x4f, texelSize:vec2f, sphereSize:f32, }`;

// ─── Render: depth map (billboard spheres) ───────────────────────
const DEPTH_MAP_CODE = `
struct PosVel { position:vec3f, v:vec3f, }
` + RENDER_UNI + `
@group(0) @binding(0) var<storage, read> pv:array<PosVel>;
@group(0) @binding(1) var<uniform> u:RU;
struct VO { @builtin(position) pos:vec4f, @location(0) uv:vec2f, @location(1) vp:vec3f, }
struct FO { @location(0) depth:f32, @builtin(frag_depth) fd:f32, }
@vertex fn vs(@builtin(vertex_index) vi:u32, @builtin(instance_index) ii:u32)->VO{
  let corners=array(vec2f(.5,.5),vec2f(.5,-.5),vec2f(-.5,-.5),vec2f(.5,.5),vec2f(-.5,-.5),vec2f(-.5,.5));
  let sz=u.sphereSize; let corner=vec3f(corners[vi]*sz,0.0);
  let wp=pv[ii].position; let vp=(u.viewMat*vec4f(wp,1.0)).xyz;
  return VO(u.projMat*vec4f(vp+corner,1.0), corners[vi]+0.5, vp);
}
@fragment fn fs(@location(0) uv:vec2f, @location(1) vp:vec3f)->FO{
  let n2=uv*2.0-1.0; let r2=dot(n2,n2); if(r2>1.0){discard;}
  let nz=sqrt(1.0-r2); let r=u.sphereSize*0.5;
  let rvp=vec4f(vp+vec3f(n2,nz)*r,1.0); let cp=u.projMat*rvp;
  return FO(rvp.z, cp.z/cp.w);
}`;

// ─── Render: fullscreen VS ──────────────────────────────────────
const FS_QUAD_VS = `
override screenW:f32; override screenH:f32;
struct VO { @builtin(position) pos:vec4f, @location(0) uv:vec2f, @location(1) iuv:vec2f, }
@vertex fn vs(@builtin(vertex_index) vi:u32)->VO{
  let p=array(vec2f(1,1),vec2f(1,-1),vec2f(-1,-1),vec2f(1,1),vec2f(-1,-1),vec2f(-1,1));
  let u=array(vec2f(1,0),vec2f(1,1),vec2f(0,1),vec2f(1,0),vec2f(0,1),vec2f(0,0));
  var o:VO; o.pos=vec4f(p[vi],0,1); o.uv=u[vi]; o.iuv=o.uv*vec2f(screenW,screenH); return o;
}`;

// ─── Render: bilateral depth smooth ──────────────────────────────
const SMOOTH_CODE = RENDER_UNI + `
@group(0) @binding(0) var dt:texture_2d<f32>;
@group(0) @binding(1) var<uniform> blurDir:vec2f;
@group(0) @binding(2) var<uniform> u:RU;
@fragment fn fs(@location(0) uv:vec2f, @location(1) iuv:vec2f)->@location(0) vec4f{
  let depth=abs(textureLoad(dt,vec2u(iuv),0).r);
  if(depth>=1e4){return vec4f(depth,0,0,1);}
  let fs=min(30,i32(ceil(8.0*u.sphereSize/depth)));
  let si=1.0/(2.0*f32(fs)*f32(fs)/4.0+0.01);
  let dth=5.0;
  var sum=depth; var ws=1.0;
  for(var r=1;r<=fs;r++){
    let gw=exp(-f32(r*r)*si);
    let d1=abs(textureLoad(dt,vec2u(iuv-f32(r)*blurDir),0).r);
    let d2=abs(textureLoad(dt,vec2u(iuv+f32(r)*blurDir),0).r);
    var w1=gw; var w2=gw;
    if(abs(d1-depth)>dth){w1=0.0;} if(abs(d2-depth)>dth){w2=0.0;}
    sum+=d1*w1+d2*w2; ws+=w1+w2;
  }
  return vec4f(sum/ws,0,0,1);
}`;

// ─── Render: composite (normals + Lambert) ───────────────────────
const COMPOSITE_CODE = RENDER_UNI + `
@group(0) @binding(0) var dt:texture_2d<f32>;
@group(0) @binding(1) var<uniform> u:RU;

fn unproj(uv:vec2f, d:f32)->vec3f{
  var ndc=vec4f(uv.x*2.0-1.0,1.0-2.0*uv.y,0.0,1.0);
  ndc.z=-u.projMat[2].z+u.projMat[3].z/d;
  let ep=u.invProjMat*ndc; return ep.xyz/ep.w;
}
@fragment fn fs(@location(0) uv:vec2f, @location(1) iuv:vec2f)->@location(0) vec4f{
  let depth=abs(textureLoad(dt,vec2u(iuv),0).r);
  if(depth>=1e4){
    let rd=normalize((u.invViewMat*vec4f(unproj(uv,1.0),0.0)).xyz);
    let sky=mix(vec3f(0.38,0.38,0.42),vec3f(0.58,0.58,0.65),clamp(rd.y*0.5+0.5,0.0,1.0));
    let cp=(u.invViewMat*vec4f(0,0,0,1)).xyz;
    if(rd.y<-0.001){
      let t=-cp.y/rd.y;
      if(t>0.0 && t<500.0){
        let hp=cp+t*rd; let g=16.0;
        let lx=abs(fract(hp.x/g-0.5)-0.5)<0.015;
        let lz=abs(fract(hp.z/g-0.5)-0.5)<0.015;
        return vec4f(select(vec3f(0.5),vec3f(0.42),lx||lz),1.0);
      }
    }
    return vec4f(sky,1.0);
  }
  let vp=unproj(uv,depth); let ts=u.texelSize;
  let dr=unproj(uv+vec2f(ts.x,0),abs(textureLoad(dt,vec2u(iuv+vec2f(1,0)),0).r))-vp;
  let dl=vp-unproj(uv-vec2f(ts.x,0),abs(textureLoad(dt,vec2u(iuv-vec2f(1,0)),0).r));
  let dd=unproj(uv+vec2f(0,ts.y),abs(textureLoad(dt,vec2u(iuv+vec2f(0,1)),0).r))-vp;
  let du=vp-unproj(uv-vec2f(0,ts.y),abs(textureLoad(dt,vec2u(iuv-vec2f(0,1)),0).r));
  let dx=select(dr,dl,abs(dr.z)>abs(dl.z));
  let dy=select(dd,du,abs(dd.z)>abs(du.z));
  let n=-normalize(cross(dx,dy));
  let nw=(u.invViewMat*vec4f(n,0.0)).xyz;
  let ld=normalize(vec3f(0.3,1.0,0.5));
  let NdL=max(dot(nw,ld),0.0);
  let amb=0.35; let albedo=vec3f(0.55,0.38,0.22);
  let col=albedo*(amb+(1.0-amb)*NdL);
  // Subtle specular
  let rdv=normalize(vp);
  let rdw=(u.invViewMat*vec4f(rdv,0.0)).xyz;
  let H=normalize(ld-rdw);
  let spec=pow(max(dot(H,nw),0.0),60.0)*0.15;
  return vec4f(pow(col+vec3f(spec),vec3f(1.0/2.2)),1.0);
}`;

// ═════════════════════════════════════════════════════════════════
//  MAIN
// ═════════════════════════════════════════════════════════════════
async function main(){
  const canvas = document.getElementById('c');
  const info = document.getElementById('overlay');
  if(!navigator.gpu){ info.textContent='WebGPU not supported'; return; }
  const adapter = await navigator.gpu.requestAdapter();
  if(!adapter){ info.textContent='No GPU adapter'; return; }
  const device = await adapter.requestDevice();
  const ctx = canvas.getContext('webgpu');
  const fmt = navigator.gpu.getPreferredCanvasFormat();
  const dpr = 0.75;
  canvas.width = canvas.clientWidth*dpr; canvas.height = canvas.clientHeight*dpr;
  ctx.configure({ device, format:fmt });
  const W = canvas.width, H = canvas.height;

  // ─── Buffers ───────────────────────────────────────────────────
  const particleBuf = device.createBuffer({ size:P_STRIDE*MAX_P, usage: GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST });
  const posvelBuf   = device.createBuffer({ size:PV_STRIDE*MAX_P, usage: GPUBufferUsage.STORAGE });
  const cellBuf     = device.createBuffer({ size:16*TOTAL_CELLS, usage: GPUBufferUsage.STORAGE });
  const gridSizeBuf = device.createBuffer({ size:16, usage: GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST });
  const numPBuf     = device.createBuffer({ size:4, usage: GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST });
  const simPBuf     = device.createBuffer({ size:64, usage: GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST });
  const renUniBuf   = device.createBuffer({ size:272, usage: GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST });
  const blurDirBufX = device.createBuffer({ size:8, usage: GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST });
  const blurDirBufY = device.createBuffer({ size:8, usage: GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST });
  device.queue.writeBuffer(gridSizeBuf, 0, new F32([GX,GY,GZ,0]));
  device.queue.writeBuffer(blurDirBufX, 0, new F32([1,0]));
  device.queue.writeBuffer(blurDirBufY, 0, new F32([0,1]));

  // ─── Textures ──────────────────────────────────────────────────
  const depthMapTex = device.createTexture({ size:[W,H], format:'r32float', usage: GPUTextureUsage.RENDER_ATTACHMENT|GPUTextureUsage.TEXTURE_BINDING });
  const tmpDepthTex = device.createTexture({ size:[W,H], format:'r32float', usage: GPUTextureUsage.RENDER_ATTACHMENT|GPUTextureUsage.TEXTURE_BINDING });
  const depthTestTex = device.createTexture({ size:[W,H], format:'depth32float', usage: GPUTextureUsage.RENDER_ATTACHMENT });
  const dmView = depthMapTex.createView(), tdView = tmpDepthTex.createView(), dtView = depthTestTex.createView();

  // ─── Compute pipelines ─────────────────────────────────────────
  function cPipe(code, consts={}){ return device.createComputePipeline({ layout:'auto', compute:{ module:device.createShaderModule({code}), constants:consts }}); }
  const clearPipe = cPipe(CLEAR_GRID);
  const p2gPipe   = cPipe(P2G_CODE, {FP_MULT});
  const updPipe   = cPipe(UPDATE_GRID, {FP_MULT, FP_INV});
  const g2pPipe   = cPipe(G2P_CODE, {FP_INV});
  const cpvPipe   = cPipe(COPY_PV);

  // ─── Render pipelines ──────────────────────────────────────────
  const dmMod = device.createShaderModule({code:DEPTH_MAP_CODE});
  const depthMapPipe = device.createRenderPipeline({
    layout:'auto', vertex:{module:dmMod}, fragment:{module:dmMod, targets:[{format:'r32float'}]},
    primitive:{topology:'triangle-list'}, depthStencil:{depthWriteEnabled:true, depthCompare:'less', format:'depth32float'},
  });
  const scr = {screenW:W, screenH:H};
  const smoothVS = device.createShaderModule({code:FS_QUAD_VS});
  const smoothFS = device.createShaderModule({code:SMOOTH_CODE});
  const smoothPipe = device.createRenderPipeline({
    layout:'auto', vertex:{module:smoothVS, constants:scr},
    fragment:{module:smoothFS, targets:[{format:'r32float'}]}, primitive:{topology:'triangle-list'},
  });
  const compVS = device.createShaderModule({code:FS_QUAD_VS});
  const compFS = device.createShaderModule({code:COMPOSITE_CODE});
  const compPipe = device.createRenderPipeline({
    layout:'auto', vertex:{module:compVS, constants:scr},
    fragment:{module:compFS, targets:[{format:fmt}]}, primitive:{topology:'triangle-list'},
  });

  // ─── Bind groups ───────────────────────────────────────────────
  function bg(pipe, entries){ return device.createBindGroup({ layout:pipe.getBindGroupLayout(0), entries:entries.map((r,i)=>({binding:i,resource:r})) }); }
  function buf(b){ return {buffer:b}; }

  const clearBG = bg(clearPipe, [buf(cellBuf)]);
  const p2gBG   = bg(p2gPipe, [buf(particleBuf),buf(cellBuf),buf(gridSizeBuf),buf(numPBuf),buf(simPBuf)]);
  const updBG   = bg(updPipe, [buf(cellBuf),buf(gridSizeBuf),buf(simPBuf)]);
  const g2pBG   = bg(g2pPipe, [buf(particleBuf),buf(cellBuf),buf(gridSizeBuf),buf(numPBuf),buf(simPBuf)]);
  const cpvBG   = bg(cpvPipe, [buf(particleBuf),buf(posvelBuf),buf(numPBuf)]);
  const dmBG    = bg(depthMapPipe, [buf(posvelBuf),buf(renUniBuf)]);
  const smBGx   = bg(smoothPipe, [dmView, buf(blurDirBufX), buf(renUniBuf)]);
  const smBGy   = bg(smoothPipe, [tdView, buf(blurDirBufY), buf(renUniBuf)]);
  const compBG  = bg(compPipe, [dmView, buf(renUniBuf)]);

  // ─── Init particles ────────────────────────────────────────────
  let numP = 70000;
  function initParticles(count){
    numP = Math.min(count, MAX_P);
    const stride = P_STRIDE/4; // floats per particle = 36
    const data = new F32(numP * stride);
    const bx=GX*0.55, by=GY*0.45, bz=GZ*0.55;
    const ox=(GX-bx)/2, oy=GY*0.25, oz=(GZ-bz)/2;
    for(let i=0;i<numP;i++){
      const b=i*stride;
      data[b]=ox+Math.random()*bx; data[b+1]=oy+Math.random()*by; data[b+2]=oz+Math.random()*bz;
      // F = identity (column-major mat3x3f: each column is vec3f + 1 float padding)
      // Column 0 at offset 20: [1,0,0,pad]
      // Column 1 at offset 24: [0,1,0,pad]
      // Column 2 at offset 28: [0,0,1,pad]
      data[b+20]=1; data[b+21]=0; data[b+22]=0;
      data[b+24]=0; data[b+25]=1; data[b+26]=0;
      data[b+28]=0; data[b+29]=0; data[b+30]=1;
    }
    device.queue.writeBuffer(particleBuf, 0, data);
    device.queue.writeBuffer(numPBuf, 0, new Uint32Array([numP]));
  }
  initParticles(numP);

  // ─── Camera ────────────────────────────────────────────────────
  let camTheta=0.5, camPhi=0.4, camDist=75;
  const target=[GX/2, GY*0.25, GZ/2];
  let dragging=false, lastMX=0, lastMY=0;
  let mouseNDC=[0,0], mouseVelNDC=[0,0], mouseDown=false;

  canvas.addEventListener('mousedown',e=>{ dragging=true; lastMX=e.clientX; lastMY=e.clientY; if(e.shiftKey)mouseDown=true; });
  window.addEventListener('mouseup',()=>{ dragging=false; mouseDown=false; });
  window.addEventListener('mousemove',e=>{
    const nx=e.clientX/canvas.clientWidth, ny=e.clientY/canvas.clientHeight;
    mouseVelNDC=[nx-mouseNDC[0], ny-mouseNDC[1]];
    mouseNDC=[nx,ny];
    if(!dragging)return;
    if(e.shiftKey){ mouseDown=true; return; }
    const dx=e.clientX-lastMX, dy=e.clientY-lastMY;
    camTheta-=dx*0.005; camPhi=Math.max(-0.3,Math.min(1.4,camPhi+dy*0.005));
    lastMX=e.clientX; lastMY=e.clientY;
  });
  canvas.addEventListener('wheel',e=>{ camDist=Math.max(20,Math.min(200,camDist+e.deltaY*0.1)); e.preventDefault(); },{passive:false});

  function getEye(){
    return [target[0]+camDist*Math.cos(camPhi)*Math.sin(camTheta),
            target[1]+camDist*Math.sin(camPhi),
            target[2]+camDist*Math.cos(camPhi)*Math.cos(camTheta)];
  }
  function getMouseWorldPos(){
    // Intersect mouse ray with Y=target[1] plane
    const proj=m4(), view=m4(), invVP=m4(), tmp=m4();
    m4persp(proj, 60*Math.PI/180, W/H, 0.1, 500);
    m4look(view, getEye(), target, [0,1,0]);
    m4mul(tmp, proj, view);
    m4inv(invVP, tmp);
    const nx=mouseNDC[0]*2-1, ny=1-mouseNDC[1]*2;
    // Near point
    const n4=[nx,ny,-1,1], f4=[nx,ny,1,1];
    function unp(v){ const o=[0,0,0,0]; for(let i=0;i<4;i++){let s=0;for(let k=0;k<4;k++)s+=invVP[k*4+i]*v[k];o[i]=s;} const w=o[3]||1; return [o[0]/w,o[1]/w,o[2]/w]; }
    const np=unp(n4), fp=unp(f4);
    const d=[fp[0]-np[0],fp[1]-np[1],fp[2]-np[2]];
    if(Math.abs(d[1])<1e-6)return [GX/2,GY*0.25,GZ/2];
    const t=(target[1]-np[1])/d[1];
    return [np[0]+d[0]*t, np[1]+d[1]*t, np[2]+d[2]*t];
  }

  // ─── UI ────────────────────────────────────────────────────────
  let curMat = MATS.sand;
  let paused = false;
  document.getElementById('matSel').addEventListener('change',e=>{ curMat=MATS[e.target.value]; });
  document.getElementById('pSlider').addEventListener('input',e=>{ document.getElementById('pLbl').textContent=e.target.value*10+'k'; });
  document.getElementById('resetBtn').addEventListener('click',()=>{
    const c = parseInt(document.getElementById('pSlider').value)*10000;
    initParticles(c);
  });
  document.getElementById('pauseChk').addEventListener('change',e=>{ paused=e.target.checked; });
  document.addEventListener('keydown',e=>{ if(e.code==='KeyP'){ paused=!paused; document.getElementById('pauseChk').checked=paused; }});

  // ─── Render loop ───────────────────────────────────────────────
  const projM=m4(), viewM=m4(), invP=m4(), invV=m4(), renUniData=new F32(68), simPData=new F32(16);
  const sphereSize = 1.2;
  let prevMouseWorld = [0,0,0];

  info.textContent = '🪨 Soil Lab – Drucker-Prager MLS-MPM';

  function frame(){
    requestAnimationFrame(frame);

    // Update matrices
    m4persp(projM, 60*Math.PI/180, W/H, 0.1, 500);
    m4look(viewM, getEye(), target, [0,1,0]);
    m4inv(invP, projM); m4inv(invV, viewM);
    renUniData.set(projM, 0); renUniData.set(invP, 16); renUniData.set(viewM, 32); renUniData.set(invV, 48);
    renUniData[64]=1/W; renUniData[65]=1/H; renUniData[66]=sphereSize;
    device.queue.writeBuffer(renUniBuf, 0, renUniData);

    // Sim params
    const mu = curMat.E/(2*(1+curMat.nu));
    const lam = curMat.E*curMat.nu/((1+curMat.nu)*(1-2*curMat.nu));
    const mwp = getMouseWorldPos();
    const mvel = [mwp[0]-prevMouseWorld[0], mwp[1]-prevMouseWorld[1], mwp[2]-prevMouseWorld[2]];
    const mvelScale = 50;
    simPData[0]=5e-4; simPData[1]=200.0; simPData[2]=mu; simPData[3]=lam;
    simPData[4]=curMat.phi; simPData[5]=curMat.coh; simPData[6]=15; simPData[7]=mouseDown?1:0;
    simPData[8]=mwp[0]; simPData[9]=mwp[1]; simPData[10]=mwp[2]; simPData[11]=0;
    simPData[12]=mvel[0]*mvelScale; simPData[13]=mvel[1]*mvelScale; simPData[14]=mvel[2]*mvelScale; simPData[15]=0;
    device.queue.writeBuffer(simPBuf, 0, simPData);
    prevMouseWorld = mwp;

    const enc = device.createCommandEncoder();

    if(!paused){
      const cp = enc.beginComputePass();
      cp.setPipeline(clearPipe); cp.setBindGroup(0,clearBG); cp.dispatchWorkgroups(Math.ceil(TOTAL_CELLS/64));
      cp.setPipeline(p2gPipe); cp.setBindGroup(0,p2gBG); cp.dispatchWorkgroups(Math.ceil(numP/64));
      cp.setPipeline(updPipe); cp.setBindGroup(0,updBG); cp.dispatchWorkgroups(Math.ceil(TOTAL_CELLS/64));
      cp.setPipeline(g2pPipe); cp.setBindGroup(0,g2pBG); cp.dispatchWorkgroups(Math.ceil(numP/64));
      cp.setPipeline(cpvPipe); cp.setBindGroup(0,cpvBG); cp.dispatchWorkgroups(Math.ceil(numP/64));
      cp.end();
    }

    // Depth map
    const dp = enc.beginRenderPass({
      colorAttachments:[{view:dmView,clearValue:{r:1e6,g:0,b:0,a:1},loadOp:'clear',storeOp:'store'}],
      depthStencilAttachment:{view:dtView,depthClearValue:1,depthLoadOp:'clear',depthStoreOp:'store'},
    });
    dp.setPipeline(depthMapPipe); dp.setBindGroup(0,dmBG); dp.draw(6,numP); dp.end();

    // Bilateral smooth X
    const sx = enc.beginRenderPass({colorAttachments:[{view:tdView,clearValue:{r:1e6,g:0,b:0,a:1},loadOp:'clear',storeOp:'store'}]});
    sx.setPipeline(smoothPipe); sx.setBindGroup(0,smBGx); sx.draw(6); sx.end();
    // Bilateral smooth Y
    const sy = enc.beginRenderPass({colorAttachments:[{view:dmView,clearValue:{r:1e6,g:0,b:0,a:1},loadOp:'clear',storeOp:'store'}]});
    sy.setPipeline(smoothPipe); sy.setBindGroup(0,smBGy); sy.draw(6); sy.end();

    // Composite
    const rp = enc.beginRenderPass({colorAttachments:[{view:ctx.getCurrentTexture().createView(),clearValue:{r:0.4,g:0.4,b:0.42,a:1},loadOp:'clear',storeOp:'store'}]});
    rp.setPipeline(compPipe); rp.setBindGroup(0,compBG); rp.draw(6); rp.end();

    device.queue.submit([enc.finish()]);
  }
  requestAnimationFrame(frame);
}
main().catch(e=>{ document.getElementById('overlay').textContent='Error: '+e.message; console.error(e); });
</script>
</body>
</html>
